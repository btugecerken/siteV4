<style>
    :root {
      --emerald:    #1a5c3a;
      --emerald-mid:#2d7a52;
      --emerald-lt: #4caf80;
      --gold:       #c9a84c;
      --gold-lt:    #e8c97a;
      --cream:      #faf6ef;
      --ink:        #1a1a18;
      --ink-soft:   #3d3d38;
      --muted:      #7a7a72;
      --white:      #ffff;
      --shadow:     0 8px 40px rgba(26,92,58,0.13);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Noto Serif TR', serif;
      background: var(--cream);
      color: var(--ink);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 15% 20%, rgba(26,92,58,0.06) 0%, transparent 50%),
        radial-gradient(circle at 85% 75%, rgba(201,168,76,0.07) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(250,246,239,0.92);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(201,168,76,0.25);
    }

    .header-inner {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px;
      height: 72px;
      display: flex;
      align-items: center;
      gap: 32px;
    }

    .logo-wrap {
      display: flex; align-items: center; gap: 12px; text-decoration: none; flex-shrink: 0;
    }
    .logo-wrap img { height: 44px; width: 44px; object-fit: contain; }
    .logo-text { line-height: 1.2; }
    .logo-text .univ {
      display: block; font-family: 'Syne', sans-serif; font-size: 9.5px;
      font-weight: 700; letter-spacing: 0.12em; color: var(--muted); text-transform: uppercase;
    }
    .logo-text .comm {
      display: block; font-family: 'Syne', sans-serif; font-size: 14px;
      font-weight: 800; color: var(--emerald); letter-spacing: 0.04em;
    }

    nav { margin-left: auto; display: flex; align-items: center; gap: 6px; }
    nav a {
      font-family: 'Syne', sans-serif; font-size: 12.5px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-soft);
      text-decoration: none; padding: 8px 14px; border-radius: 6px; transition: all .2s;
    }
    nav a:hover, nav a.active { color: var(--emerald); background: rgba(26,92,58,0.07); }
    
    .btn-login {
      color: var(--emerald) !important; border: 1.5px solid var(--emerald) !important;
      border-radius: 50px !important; padding: 7px 18px !important; margin-left: 10px;
    }
    .btn-login:hover { background: var(--emerald) !important; color: var(--white) !important; }

    /* ════ MOBİL MENÜ BUTONU (MASAÜSTÜNDE GİZLİ) ════ */
    #mobile-menu-btn { display: none; background: none; border: none; cursor: pointer; padding: 8px; }
    #mobile-menu-btn span { display: block; width: 24px; height: 2px; background: var(--ink); margin: 5px 0; transition: 0.3s ease; }

    .hero-section {
      padding: 160px 28px 80px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .hero-title {
      font-family: 'Amiri', serif;
      font-size: clamp(36px, 5vw, 56px);
      font-weight: 700;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 24px;
    }
    .hero-title i { color: var(--gold); }
    .hero-subtitle {
      font-size: 18px;
      color: var(--muted);
      max-width: 600px;
      margin: 0 auto;
      line-height: 1.6;
    }

    .filters-section {
      max-width: 1180px;
      margin: 0 auto 40px;
      padding: 0 28px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .search-bar { width: 100%; max-width: 500px; position: relative; }
    .search-bar input {
      width: 100%; padding: 16px 24px 16px 48px; border-radius: 50px;
      border: 1px solid rgba(201,168,76,0.3); background: var(--white);
      font-family: 'Noto Serif TR', serif; font-size: 15px; color: var(--ink);
      box-shadow: 0 4px 20px rgba(0,0,0,0.04); outline: none; transition: all 0.3s ease;
    }
    .search-bar input:focus { border-color: var(--emerald); box-shadow: 0 4px 20px rgba(26,92,58,0.1); }
    .search-bar i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--muted); }

    .category-filters { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
    .filter-btn {
      padding: 10px 20px; border-radius: 50px; border: 1px solid rgba(26,92,58,0.15);
      background: transparent; font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      color: var(--emerald); cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .filter-btn:hover { background: rgba(26,92,58,0.05); }
    .filter-btn.active { background: var(--emerald); color: var(--white); border-color: var(--emerald); }

    .events-grid {
      max-width: 1180px;
      margin: 0 auto;
      padding: 0 28px 100px;
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px;
    }

    .event-card {
      background: var(--white); border-radius: 20px; border: 1px solid rgba(201,168,76,0.2);
      box-shadow: 0 10px 30px rgba(0,0,0,0.03); padding: 30px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex; flex-direction: column; position: relative; overflow: hidden;
    }
    .event-card::after {
      content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 4px;
      background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease;
    }
    .event-card:hover { transform: translateY(-8px); box-shadow: var(--shadow); border-color: transparent; }
    .event-card:hover::after { transform: scaleX(1); }

    .category-badge {
      display: inline-block; font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); background: rgba(201,168,76,0.1);
      padding: 6px 12px; border-radius: 50px; border: 1px solid rgba(201,168,76,0.2); align-self: flex-start; margin-bottom: 16px;
    }

    .event-title { font-family: 'Amiri', serif; font-size: 24px; font-weight: 700; color: var(--ink); line-height: 1.3; margin-bottom: 14px; }
    .event-meta { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; font-family: 'Syne', sans-serif; font-size: 13px; color: var(--emerald-mid); }
    .event-meta span { display: flex; align-items: center; gap: 8px; }
    .event-desc { font-size: 15px; color: var(--ink-soft); line-height: 1.6; margin-bottom: 20px; flex-grow: 1; }

    .read-more-link {
      display: inline-flex; align-items: center; margin-top: auto; font-family: 'Syne', sans-serif;
      font-size: 13.5px; font-weight: 700; color: var(--emerald); text-decoration: none;
      text-transform: uppercase; letter-spacing: 0.05em; transition: all 0.3s ease;
    }
    .read-more-link i { margin-left: 6px; transition: transform 0.3s ease; }
    .read-more-link:hover { color: var(--gold); }
    .read-more-link:hover i { transform: translateX(4px); }

    .no-results {
      grid-column: 1 / -1; text-align: center; padding: 60px 20px; font-size: 18px; color: var(--muted);
      border: 1px dashed rgba(201,168,76,0.3); border-radius: 16px; background: rgba(255,255,255,0.5);
    }

    /* ════ MOBİL GÖRÜNÜM (RESPONSIVE) DÜZENLEMELERİ ════ */
    @media (max-width: 992px) {
      .header-inner { padding: 0 20px; }
      #mobile-menu-btn { display: block; margin-left: auto; }
      
      nav#main-nav { 
        display: none; /* Başlangıçta gizli */
        position: absolute; 
        top: 72px; /* Header'ın hemen altında */
        left: 0; 
        right: 0; 
        background: rgba(250,246,239,0.98); 
        backdrop-filter: blur(10px);
        flex-direction: column; 
        padding: 20px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        border-bottom: 1px solid rgba(201,168,76,0.25);
      }
      
      /* JS ile eklenecek açılma class'ı */
      nav#main-nav.menu-acik { 
        display: flex !important; 
      }
      
      nav#main-nav a { width: 100%; text-align: center; padding: 12px 14px; }
      .btn-login { margin-left: 0 !important; margin-top: 10px; }
      .hero-section { padding-top: 120px; }
    }
</style>
</head>

  ];

  let currentYear = 'all';
  let searchQuery = '';

  const eventsGrid = document.getElementById('eventsGrid');
  const searchInput = document.getElementById('searchInput');
  const filterBtns = document.querySelectorAll('.filter-btn');

  function getFilteredEvents() {
    let filtered = events;
    if(currentYear !== 'all') filtered = filtered.filter(val => val.academicYear === currentYear);
    if(searchQuery !== '') {
      const q = searchQuery.toLowerCase();
      filtered = filtered.filter(val => 
        val.title.toLowerCase().includes(q) || val.desc.toLowerCase().includes(q) ||
        val.location.toLowerCase().includes(q) || val.tags.some(tag => tag.toLowerCase().includes(q))
      );
    }
    return filtered;
  }

  function renderEvents(eventsToRender) {
    eventsGrid.innerHTML = '';
    if(eventsToRender.length === 0) {
      eventsGrid.innerHTML = '<div class="no-results">Bu kriterlere uyan etkinlik bulunamadı.</div>';
      return;
    }
    eventsToRender.forEach(event => {
      const card = document.createElement('div');
      card.className = 'event-card';
      const eventLink = event.link;
      card.innerHTML = `
        <div class="card-content" style="display:flex; flex-direction:column; height: 100%;">
          <span class="category-badge">${event.category}</span>
          <h3 class="event-title">${event.title}</h3>
          <div class="event-meta">
            <span><i class="fa-regular fa-calendar"></i> ${event.date}</span>
            <span><i class="fa-solid fa-graduation-cap"></i> ${event.academicYear}</span>
            <span><i class="fa-solid fa-location-dot"></i> ${event.location}</span>
          </div>
          <p class="event-desc">${event.desc}</p>
          <a href="${eventLink}" class="read-more-link">
            Etkinliği İncele <i class="fa-solid fa-arrow-right"></i>
          </a>
        </div>
      `;
      eventsGrid.appendChild(card);
    });
  }

  filterBtns.forEach(btn => {
    btn.addEventListener('click', (e) => {
      filterBtns.forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentYear = e.target.getAttribute('data-year');
      renderEvents(getFilteredEvents());
    });
  });

  searchInput.addEventListener('input', (e) => {
    searchQuery = e.target.value.trim();
    renderEvents(getFilteredEvents());
  });

  renderEvents(getFilteredEvents());
</script>

<!-- JS: MOBİL MENÜ HAREKETİ -->
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const mobileBtn = document.getElementById('mobile-menu-btn');
    const mainNav = document.getElementById('main-nav');

    if (mobileBtn && mainNav) {
      mobileBtn.addEventListener('click', function() {
        mainNav.classList.toggle('menu-acik');
        // Hamburger ikonu animasyonu
        const spans = this.querySelectorAll('span');
        if (mainNav.classList.contains('menu-acik')) {
          spans[0].style.transform = 'rotate(45deg) translate(5px, 5px)';
          spans[1].style.opacity = '0';
          spans[2].style.transform = 'rotate(-45deg) translate(5px, -6px)';
        } else {
          spans[0].style.transform = 'none';
          spans[1].style.opacity = '1';
          spans[2].style.transform = 'none';
        }
      });
    }
  });
</script>
